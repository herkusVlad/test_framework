name: API Tests CI

on:
  pull_request:
    branches: [ "main" ]

permissions:
  pull-requests: write
  checks: write
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        run: mvn clean test
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-html-report
          path: target/site/allure-maven-plugin
          retention-days: 1

      - name: Post Allure Report summary
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const path = 'target/site/allure-maven-plugin/widgets/summary.json';

            if (fs.existsSync(path)) {
              const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
              const passed = summary.statistic.passed || 0;
              const failed = summary.statistic.failed || 0;
              const broken = summary.statistic.broken || 0;
              const skipped = summary.statistic.skipped || 0;
              const total = summary.statistic.total || 0;

              const body = `### 📊 Allure Report Summary\n` +
                           `| Total | Passed ✅ | Failed ❌ | Broken ⚠️ | Skipped ⏭️ |\n` +
                           `|-------|-----------|-----------|-----------|------------|\n` +
                           `| **${total}** | ${passed} | ${failed} | ${broken} | ${skipped} |\n\n` +
                           `[🔗 Open full Allure Report](https://${context.repo.owner}.github.io/${context.repo.repo}/)`;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              console.log("Summary file not found!");
            }

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-maven-plugin